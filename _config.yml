title: Jiaqian Zhu (Janelle)
tagline: PhD Student in Computer Science 
email: jiaqianzhu915@gmail.com

# Short bio shown under your name on the homepage (Markdown allowed)

description: >-
  My name is Jiaqian Zhu (Janelle), and I'm a PhD student in Computer Science
  at Missouri University of Science and Technology. My research interests
  include Agentic AI, World Models, NLP, and AI for science. I'm also looking
  for startup opportunities, and I love exploring new things across all kinds
  of disciplines. Always happy to connect, exchange ideas, and learn together —
  feel free to reach out!

# Your affiliation / location (shown in the sidebar)
affiliation: Missouri University of Science and Technology
location: Rolla, MO

# Profile photo: drop a square image in assets/images/ and put its name here
avatar: profile.jpg

# Set this when you deploy. For GitHub Pages at username.github.io leave url
# blank and baseurl empty. For a project repo (username.github.io/repo) set
# baseurl: "/repo".
url: ""
baseurl: ""

# ─────────────────────────────────────────────────────────────
#  Build settings — you usually don't need to touch these
# ─────────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

collections:
  papers:
    output: true
    permalink: /papers/:name/
  startup:
    output: true
    permalink: /startup/:name/
  reading:
    output: true
    permalink: /reading/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: papers
    values:
      layout: paper
  - scope:
      path: ""
      type: startup
    values:
      layout: startup
  - scope:
      path: ""
      type: reading
    values:
      layout: reading

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor