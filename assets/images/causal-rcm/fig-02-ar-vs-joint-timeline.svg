<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 358" role="img"><style>
text{font-family:'Helvetica Neue',Arial,sans-serif}
.t{font-size:14px;fill:#3d3d3a}
.ts{font-size:12px;fill:#73726c}
.th{font-size:14px;font-weight:500;fill:#2c2c2a}
.box{fill:#f7f6f2;stroke:#d8d6cd}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
.leader{stroke:#b4b2a9;stroke-width:.5;stroke-dasharray:4 3;fill:none}
.c-blue{fill:#E6F1FB;stroke:#185FA5}.c-blue text.t,.c-blue text.th{fill:#0C447C}.c-blue text.ts{fill:#185FA5}
.c-teal{fill:#E1F5EE;stroke:#0F6E56}.c-teal text.t,.c-teal text.th{fill:#085041}.c-teal text.ts{fill:#0F6E56}
.c-coral{fill:#FAECE7;stroke:#993C1D}.c-coral text.t,.c-coral text.th{fill:#712B13}.c-coral text.ts{fill:#993C1D}
.c-purple{fill:#EEEDFE;stroke:#534AB7}.c-purple text.t,.c-purple text.th{fill:#3C3489}.c-purple text.ts{fill:#534AB7}
.c-amber{fill:#FAEEDA;stroke:#854F0B}.c-amber text.t,.c-amber text.th{fill:#633806}.c-amber text.ts{fill:#854F0B}
.c-green{fill:#EAF3DE;stroke:#3B6D11}.c-green text.t,.c-green text.th{fill:#27500A}.c-green text.ts{fill:#3B6D11}
.c-gray{fill:#F1EFE8;stroke:#5F5E5A}.c-gray text.t,.c-gray text.th{fill:#2C2C2A}.c-gray text.ts{fill:#5F5E5A}
</style><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="th" x="60" y="48">Bidirectional · joint denoise</text>
<g class="c-amber">
<rect x="60" y="62" width="320" height="58" rx="10" stroke-width="0.5"/>
<text class="th" x="220" y="86" text-anchor="middle">5 frames, all coupled</text>
<text class="ts" x="220" y="104" text-anchor="middle">denoise jointly over T steps</text>
</g>
<line x1="380" y1="91" x2="432" y2="91" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray">
<rect x="440" y="62" width="185" height="58" rx="10" stroke-width="0.5"/>
<text class="th" x="532" y="86" text-anchor="middle">output</text>
<text class="ts" x="532" y="104" text-anchor="middle">only after full denoise</text>
</g>
<text class="th" x="60" y="170">Autoregressive · sequential</text>
<text class="ts" x="331" y="192" text-anchor="middle">action injected</text>
<line x1="331" y1="198" x2="331" y2="220" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray">
<rect x="60" y="222" width="78" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="99" y="244" text-anchor="middle">frame 1</text>
<text class="ts" x="99" y="262" text-anchor="middle">cached</text>
</g>
<g class="c-gray">
<rect x="176" y="222" width="78" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="215" y="244" text-anchor="middle">frame 2</text>
<text class="ts" x="215" y="262" text-anchor="middle">cached</text>
</g>
<g class="c-amber">
<rect x="292" y="222" width="78" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="331" y="244" text-anchor="middle">frame 3</text>
<text class="ts" x="331" y="262" text-anchor="middle">active</text>
</g>
<rect class="box" x="408" y="222" width="78" height="52" rx="8" stroke-width="0.5"/>
<text class="t" x="447" y="244" text-anchor="middle">frame 4</text>
<text class="ts" x="447" y="262" text-anchor="middle">future</text>
<rect class="box" x="524" y="222" width="78" height="52" rx="8" stroke-width="0.5"/>
<text class="t" x="563" y="244" text-anchor="middle">frame 5</text>
<text class="ts" x="563" y="262" text-anchor="middle">future</text>
<line x1="99" y1="274" x2="99" y2="298" class="arr" marker-end="url(#arrow)"/>
<line x1="215" y1="274" x2="215" y2="298" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="157" y="314" text-anchor="middle">stream out as each completes</text>
<text class="ts" x="60" y="340">past = frozen &amp; cached · present = denoising · future = not yet generated</text>
</svg>