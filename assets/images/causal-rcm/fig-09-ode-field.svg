<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 300" role="img"><style>
text{font-family:'Helvetica Neue',Arial,sans-serif}
.t{font-size:14px;fill:#3d3d3a}
.ts{font-size:12px;fill:#73726c}
.th{font-size:14px;font-weight:500;fill:#2c2c2a}
.box{fill:#f7f6f2;stroke:#d8d6cd}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
.leader{stroke:#b4b2a9;stroke-width:.5;stroke-dasharray:4 3;fill:none}
.c-blue{fill:#E6F1FB;stroke:#185FA5}.c-blue text.t,.c-blue text.th{fill:#0C447C}.c-blue text.ts{fill:#185FA5}
.c-teal{fill:#E1F5EE;stroke:#0F6E56}.c-teal text.t,.c-teal text.th{fill:#085041}.c-teal text.ts{fill:#0F6E56}
.c-coral{fill:#FAECE7;stroke:#993C1D}.c-coral text.t,.c-coral text.th{fill:#712B13}.c-coral text.ts{fill:#993C1D}
.c-purple{fill:#EEEDFE;stroke:#534AB7}.c-purple text.t,.c-purple text.th{fill:#3C3489}.c-purple text.ts{fill:#534AB7}
.c-amber{fill:#FAEEDA;stroke:#854F0B}.c-amber text.t,.c-amber text.th{fill:#633806}.c-amber text.ts{fill:#854F0B}
.c-green{fill:#EAF3DE;stroke:#3B6D11}.c-green text.t,.c-green text.th{fill:#27500A}.c-green text.ts{fill:#3B6D11}
.c-gray{fill:#F1EFE8;stroke:#5F5E5A}.c-gray text.t,.c-gray text.th{fill:#2C2C2A}.c-gray text.ts{fill:#5F5E5A}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="tip" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text class="ts" x="310" y="56" text-anchor="middle">the arrows = the ODE: a velocity dx/dt = v(x, t) at every point</text>
<g stroke="#b4b2a9" stroke-width="1">
<line x1="114" y1="86" x2="146" y2="98" marker-end="url(#tip)"/>
<line x1="234" y1="86" x2="266" y2="98" marker-end="url(#tip)"/>
<line x1="354" y1="86" x2="386" y2="98" marker-end="url(#tip)"/>
<line x1="474" y1="86" x2="506" y2="98" marker-end="url(#tip)"/>
<line x1="114" y1="160" x2="146" y2="160" marker-end="url(#tip)"/>
<line x1="234" y1="160" x2="266" y2="160" marker-end="url(#tip)"/>
<line x1="354" y1="160" x2="386" y2="160" marker-end="url(#tip)"/>
<line x1="474" y1="160" x2="506" y2="160" marker-end="url(#tip)"/>
<line x1="114" y1="234" x2="146" y2="222" marker-end="url(#tip)"/>
<line x1="234" y1="234" x2="266" y2="222" marker-end="url(#tip)"/>
<line x1="354" y1="234" x2="386" y2="222" marker-end="url(#tip)"/>
<line x1="474" y1="234" x2="506" y2="222" marker-end="url(#tip)"/>
</g>
<path d="M95 120 C200 135 340 168 516 158" fill="none" stroke="#1D9E75" stroke-width="2.5" marker-end="url(#arrow)"/>
<circle cx="95" cy="120" r="5" fill="#0F6E56"/>
<circle cx="516" cy="158" r="6" fill="#1D9E75"/>
<text class="ts" x="66" y="110" text-anchor="start">x1 · noise (t=1)</text>
<text class="ts" x="528" y="150" text-anchor="start">x0 · clean (t=0)</text>
<line x1="110" y1="262" x2="500" y2="262" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="305" y="284" text-anchor="middle">follow the velocities from noise (t=1) to clean (t=0) = the solution curve</text>
</svg>