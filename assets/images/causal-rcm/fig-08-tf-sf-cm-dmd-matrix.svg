<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 292" role="img"><style>
text{font-family:'Helvetica Neue',Arial,sans-serif}
.t{font-size:14px;fill:#3d3d3a}
.ts{font-size:12px;fill:#73726c}
.th{font-size:14px;font-weight:500;fill:#2c2c2a}
.box{fill:#f7f6f2;stroke:#d8d6cd}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
.leader{stroke:#b4b2a9;stroke-width:.5;stroke-dasharray:4 3;fill:none}
.c-blue{fill:#E6F1FB;stroke:#185FA5}.c-blue text.t,.c-blue text.th{fill:#0C447C}.c-blue text.ts{fill:#185FA5}
.c-teal{fill:#E1F5EE;stroke:#0F6E56}.c-teal text.t,.c-teal text.th{fill:#085041}.c-teal text.ts{fill:#0F6E56}
.c-coral{fill:#FAECE7;stroke:#993C1D}.c-coral text.t,.c-coral text.th{fill:#712B13}.c-coral text.ts{fill:#993C1D}
.c-purple{fill:#EEEDFE;stroke:#534AB7}.c-purple text.t,.c-purple text.th{fill:#3C3489}.c-purple text.ts{fill:#534AB7}
.c-amber{fill:#FAEEDA;stroke:#854F0B}.c-amber text.t,.c-amber text.th{fill:#633806}.c-amber text.ts{fill:#854F0B}
.c-green{fill:#EAF3DE;stroke:#3B6D11}.c-green text.t,.c-green text.th{fill:#27500A}.c-green text.ts{fill:#3B6D11}
.c-gray{fill:#F1EFE8;stroke:#5F5E5A}.c-gray text.t,.c-gray text.th{fill:#2C2C2A}.c-gray text.ts{fill:#5F5E5A}
</style>
<text class="ts" x="130" y="44" text-anchor="middle">context (down)</text>
<text class="ts" x="415" y="44" text-anchor="middle">loss / objective (across)</text>
<rect class="box" x="210" y="58" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="310" y="76" text-anchor="middle">CM</text>
<text class="ts" x="310" y="93" text-anchor="middle">consistency (forward)</text>
<rect class="box" x="420" y="58" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="76" text-anchor="middle">DMD</text>
<text class="ts" x="520" y="93" text-anchor="middle">distribution match (reverse)</text>
<rect class="box" x="60" y="106" width="140" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="136" text-anchor="middle">Teacher-Forcing</text>
<text class="ts" x="130" y="156" text-anchor="middle">clean GT context</text>
<rect class="box" x="60" y="186" width="140" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="216" text-anchor="middle">Self-Forcing</text>
<text class="ts" x="130" y="236" text-anchor="middle">own rollout context</text>
<g class="c-green">
<rect x="210" y="106" width="200" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="310" y="136" text-anchor="middle">TF-CM</text>
<text class="ts" x="310" y="156" text-anchor="middle">used · stage-2 init</text>
</g>
<rect class="box" x="420" y="106" width="200" height="72" rx="8" stroke-width="0.5"/>
<text class="t" x="520" y="136" text-anchor="middle">TF-DMD</text>
<text class="ts" x="520" y="156" text-anchor="middle">not the recipe</text>
<rect class="box" x="210" y="186" width="200" height="72" rx="8" stroke-width="0.5"/>
<text class="t" x="310" y="216" text-anchor="middle">SF-CM</text>
<text class="ts" x="310" y="236" text-anchor="middle">optional add-on</text>
<g class="c-green">
<rect x="420" y="186" width="200" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="216" text-anchor="middle">SF-DMD</text>
<text class="ts" x="520" y="236" text-anchor="middle">used · stage-3 refine</text>
</g>
<text class="ts" x="340" y="282" text-anchor="middle">green = the Causal-rCM recipe: TF-CM (initialize) then SF-DMD (refine)</text>
</svg>