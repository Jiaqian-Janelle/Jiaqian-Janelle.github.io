<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 200" role="img"><style>
text{font-family:'Helvetica Neue',Arial,sans-serif}
.t{font-size:14px;fill:#3d3d3a}
.ts{font-size:12px;fill:#73726c}
.th{font-size:14px;font-weight:500;fill:#2c2c2a}
.box{fill:#f7f6f2;stroke:#d8d6cd}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
.leader{stroke:#b4b2a9;stroke-width:.5;stroke-dasharray:4 3;fill:none}
.c-blue{fill:#E6F1FB;stroke:#185FA5}.c-blue text.t,.c-blue text.th{fill:#0C447C}.c-blue text.ts{fill:#185FA5}
.c-teal{fill:#E1F5EE;stroke:#0F6E56}.c-teal text.t,.c-teal text.th{fill:#085041}.c-teal text.ts{fill:#0F6E56}
.c-coral{fill:#FAECE7;stroke:#993C1D}.c-coral text.t,.c-coral text.th{fill:#712B13}.c-coral text.ts{fill:#993C1D}
.c-purple{fill:#EEEDFE;stroke:#534AB7}.c-purple text.t,.c-purple text.th{fill:#3C3489}.c-purple text.ts{fill:#534AB7}
.c-amber{fill:#FAEEDA;stroke:#854F0B}.c-amber text.t,.c-amber text.th{fill:#633806}.c-amber text.ts{fill:#854F0B}
.c-green{fill:#EAF3DE;stroke:#3B6D11}.c-green text.t,.c-green text.th{fill:#27500A}.c-green text.ts{fill:#3B6D11}
.c-gray{fill:#F1EFE8;stroke:#5F5E5A}.c-gray text.t,.c-gray text.th{fill:#2C2C2A}.c-gray text.ts{fill:#5F5E5A}
</style>
<text class="th" x="80" y="56" text-anchor="start">uniform t</text>
<line x1="80" y1="74" x2="600" y2="74" stroke="#d8d6cd" stroke-width="1"/>
<g class="c-teal">
<circle cx="145" cy="74" r="5"/><circle cx="210" cy="74" r="5"/><circle cx="275" cy="74" r="5"/><circle cx="340" cy="74" r="5"/><circle cx="405" cy="74" r="5"/><circle cx="470" cy="74" r="5"/><circle cx="535" cy="74" r="5"/>
</g>
<text class="th" x="80" y="132" text-anchor="start">shift = 3</text>
<line x1="80" y1="150" x2="600" y2="150" stroke="#d8d6cd" stroke-width="1"/>
<g class="c-coral">
<circle cx="236" cy="150" r="5"/><circle cx="340" cy="150" r="5"/><circle cx="414" cy="150" r="5"/><circle cx="470" cy="150" r="5"/><circle cx="513" cy="150" r="5"/><circle cx="548" cy="150" r="5"/><circle cx="576" cy="150" r="5"/>
</g>
<text class="ts" x="80" y="184" text-anchor="middle">t=0 clean</text>
<text class="ts" x="600" y="184" text-anchor="middle">t=1 noise</text>
<text class="ts" x="340" y="184" text-anchor="middle">shift packs more steps into the high-noise region</text>
</svg>