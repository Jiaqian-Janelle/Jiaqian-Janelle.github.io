---
layout: default
---
<article class="article">
  <a class="back" href="{{ '/blog/' | relative_url }}">← All posts</a>
  <header class="article-head">
    <div class="date">{{ page.date | date: "%B %-d, %Y" }}</div>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="article-content">
    {{ content }}
  </div>
</article>
